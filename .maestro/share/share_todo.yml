# T215 [US8] Maestro E2E: TodoList 공유 흐름
# 공유 버튼 → 메뉴 표시 → "나에게 전송" 최상단 확인 → 공유하기 옵션 검증
# WHY: 사용자가 할 일 목록을 공유하는 핵심 플로우.
#       공유 버튼 탭 → 메뉴 표시 → "나에게 전송" 최상단 확인까지 검증.
# PREREQ: 인증 완료 + 온보딩 완료 상태에서 메인 화면 진입, 할 일 1개 이상 존재 필요.

appId: com.todolist.app

tags:
  - share
  - us8

---

# 메인 화면 진입 확인
- assertVisible:
    text: "Plan"
    optional: true

# Review 모드일 경우 Plan 모드로 전환
- tapOn:
    text: "Plan"
    optional: true

# Plan 모드에서 할 일이 없을 수 있으므로 하나 추가
- assertVisible:
    id: "add-todo-input"
- tapOn:
    id: "add-todo-input"
- inputText: "Share test todo item"
- tapOn:
    id: "add-todo-button"

# 추가된 할 일이 목록에 표시되는지 확인
- assertVisible:
    text: "Share test todo item"

# 공유 버튼 표시 확인
- assertVisible:
    id: "share-button"

# 공유 버튼 탭
- tapOn:
    id: "share-button"

# 공유 메뉴 표시 확인
- assertVisible:
    id: "share-menu"

# "나에게 전송"이 최상단에 표시되는지 확인
- assertVisible:
    id: "share-to-self"
- assertVisible:
    text: "나에게 전송"

# "공유하기" 옵션도 표시되는지 확인
- assertVisible:
    id: "share-to-others"
- assertVisible:
    text: "공유하기"

# WHY: OS 공유 시트가 뜨면 에뮬레이터에서 비동기 처리되므로,
#       메뉴 표시 + 옵션 배치(나에게 전송 최상단) 검증까지만 수행.
#       실제 공유 동작은 사용자가 직접 확인한다.
