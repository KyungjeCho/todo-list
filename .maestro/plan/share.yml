appId: ${APP_ID}
name: "Share - 공유 버튼 동작 확인"
tags:
  - plan
  - share
---

# WHY: Expo Fast Refresh가 이전 상태를 복원할 수 있음. 오버레이가 열려있으면 닫기
- runFlow:
    when:
      visible: "input-overlay-backdrop"
    commands:
      - tapOn:
          id: "input-overlay-backdrop"

# 공유 버튼이 표시되는지 확인
- assertVisible:
    id: "share-button"

# 공유 버튼 탭 → Share Sheet 또는 메뉴 표시 확인
- tapOn:
    id: "share-button"

- assertVisible:
    id: "share-menu"

# 메뉴에 공유하기, 클립보드 복사 옵션 확인
- assertVisible:
    id: "share-to-others"

- assertVisible:
    id: "copy-to-clipboard"

# 메뉴 닫기
- tapOn:
    id: "share-backdrop"
