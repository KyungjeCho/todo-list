# T020 [US1] Maestro E2E: 신규 Apple 사용자 첫 로그인 해피 패스
# WHY(FR-001, SC-001): 로그인 화면에서 Apple 버튼을 눌러
# Apple form_post 콜백 흐름이 성공하고 홈 화면(testID="home-screen")까지 진입하는지 검증한다.
# 실제 Apple 네트워크 호출은 빌드 주입된 모의 서버 또는 백엔드 integration 환경에 위임.
# 로컬 실행 시 BACKEND_OAUTH_MODE=mock 을 상정.

appId: com.todolist.app

tags:
  - auth
  - us1
  - apple
  - smoke

---

- launchApp:
    clearState: true

# 로그인 화면 진입 확인
- assertVisible:
    id: "oauth-button-apple"

# Apple 버튼 탭 — OAuth form_post 플로우 트리거
- tapOn:
    id: "oauth-button-apple"

# 로딩 인디케이터 노출 (선택)
- assertVisible:
    id: "login-loading-indicator"
    optional: true

# 성공 시 홈 화면 진입 확인
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# 에러 메시지가 노출되지 않아야 한다 (해피 패스)
- assertNotVisible:
    id: "login-error-message"
