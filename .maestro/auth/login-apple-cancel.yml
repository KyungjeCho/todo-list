# T038 [US3] Maestro E2E: Apple 로그인 취소 복구 플로우
# WHY(FR-013, SC-003): 사용자가 Apple 시트에서 "취소"를 선택한 경우,
# - 로그인 화면으로 돌아와야 하고
# - 에러 메시지(`auth.appleCancelled`)가 노출되어야 하며
# - 나머지 OAuth 버튼이 재활성화되어 즉시 재시도 가능해야 한다.

appId: com.todolist.app

tags:
  - auth
  - us3
  - apple
  - negative

---

- launchApp:
    clearState: true

- assertVisible:
    id: "oauth-button-apple"

# Apple 버튼 탭
- tapOn:
    id: "oauth-button-apple"

# 취소 시뮬레이션 — WebBrowser 세션에서 back 제스처 또는 Apple 시트 취소
# Maestro는 외부 브라우저 시트 제어가 제한적이므로 back 키로 닫는다.
- back

# 로그인 화면 복귀 + 에러 메시지 노출
- extendedWaitUntil:
    visible:
      id: "login-error-message"
    timeout: 10000

# 다른 provider 버튼이 여전히 탭 가능해야 한다 (disabled false)
- assertVisible:
    id: "login-button-google"
- assertVisible:
    id: "login-button-naver"
- assertVisible:
    id: "login-button-kakao"

# 에러 상태에서도 Apple 버튼을 다시 탭할 수 있어야 한다
- assertVisible:
    id: "oauth-button-apple"
