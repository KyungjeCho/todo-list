# Maestro E2E Test Configuration
# https://maestro.mobile.dev/

appId: com.todolist.app

# Test execution settings
name: Todo List E2E Tests

# Base URL for API calls during E2E tests
env:
  API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}

# Tags for selective test execution
tags:
  - smoke
  - regression

# WHY: clearState를 사용하지 않음 — Expo Development Build에서 clearState가
# Dev Client의 서버 연결 정보까지 초기화하여 앱이 Dev Client 화면에 머무는 문제 발생
onFlowStart:
  - launchApp:
      stopApp: true
