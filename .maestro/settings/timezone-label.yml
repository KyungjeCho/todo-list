# T035 [US4] Maestro E2E: 타임존 선택 화면에서 영어 라벨 고정 확인
# WHY(FR-012~014): 앱 언어와 무관하게 타임존 라벨이 "South Korea/Seoul" 등
#   영어 "Country/City" 형식으로 표시되는지 검증한다. 저장값은 IANA 원문을 유지.

appId: com.todolist.app

tags:
  - settings
  - i18n
  - visual

---

# 설정 화면 진입 (홈에서 설정 탭)
- tapOn:
    id: "tab-settings"
    optional: true

# 타임존 행 탭 — TimezoneSelectScreen 오픈
- tapOn:
    text: "타임존"
    optional: true

- assertVisible:
    id: "timezone-select-screen"

# 영어 고정 라벨 확인 (한/일 초기 2건)
- assertVisible:
    text: "South Korea/Seoul"

# Tokyo는 검색으로 가시화 후 영어 라벨 확인
- tapOn:
    id: "timezone-search"
- inputText: "Tokyo"
- assertVisible:
    text: "Japan/Tokyo"
