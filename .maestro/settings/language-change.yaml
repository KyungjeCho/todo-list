# T038 [US2] Maestro E2E: 설정 → 언어 → English 선택 → UI 영어 전환 확인
# WHY: 설정에서 언어를 수동 변경하면 전체 UI가 즉시 해당 언어로 전환되는지 검증

appId: com.todolist.app

tags:
  - settings
  - i18n
  - language

---

# 메인 화면 진입 확인 (로그인 완료 상태 가정)
- assertVisible:
    id: "mode-toggle-button"

# 설정 화면으로 이동
- tapOn:
    id: "tab-settings"

# 설정 화면이 한국어로 표시되는지 확인
- assertVisible:
    id: "settings-screen"

# 언어 항목 확인 (현재 한국어)
- assertVisible:
    id: "language-button"
- assertVisible:
    id: "language-value"

# 언어 선택 드롭다운 열기
- tapOn:
    id: "language-button"

# 언어 목록이 표시되는지 확인
- assertVisible:
    id: "language-picker"

# English 선택
- tapOn:
    text: "English"

# UI가 영어로 전환되었는지 확인
- assertVisible:
    text: "Settings"
- assertVisible:
    text: "Notification Settings"
- assertVisible:
    text: "Region Settings"
- assertVisible:
    text: "Information"

# 언어 값이 English로 표시되는지 확인
- assertVisible:
    id: "language-value"
    text: "English"
