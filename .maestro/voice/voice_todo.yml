# 음성 인식 할 일 추가 흐름 (VoiceInputScreen 기반)
# 마이크 FAB 탭 → VoiceInputScreen 진입 → 녹음 UI 확인 → 종료 → 복귀
# WHY: 사용자가 음성으로 할 일을 추가하는 전체 플로우 검증.
# NOTE: 실제 음성 녹음/AI 변환은 에뮬레이터 환경에서 제한적이므로
#       UI 요소 존재 및 상태 전환 검증에 초점.

appId: com.todolist.app

tags:
  - voice
  - todo
  - smoke

---

# 앱 실행 (상태 유지 — 사전 로그인 필요)
- launchApp:
    appId: com.todolist.app
    clearState: false

# 메인 화면 진입 대기 — Plan 모드 표시
- extendedWaitUntil:
    visible:
      text: "Plan"
    timeout: 30000

# 마이크 버튼 표시 확인
- assertVisible:
    id: "voice-todo-button"

# 마이크 버튼 탭 → VoiceInputScreen 진입
- tapOn:
    id: "voice-todo-button"

# 권한 다이얼로그가 나타나면 허용
- tapOn:
    text: ".*허용.*"
    optional: true

- tapOn:
    text: ".*Allow.*"
    optional: true

- tapOn:
    text: "While using the app"
    optional: true

# 음성 입력 화면 진입 확인
- assertVisible:
    text: "음성 입력"
    optional: true

# 녹음 컨트롤 표시 확인
- assertVisible:
    id: "voice-controls"
    optional: true

# 종료 버튼 탭
- tapOn:
    id: "voice-stop-button"
    optional: true

# 메인 화면 복귀 확인
- extendedWaitUntil:
    visible:
      id: "voice-todo-button"
    timeout: 10000
