name: Backend CI

on:
  push:
    branches: [main, 'feature/**']
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

# WHY: 기본 GITHUB_TOKEN 은 `contents: write` 등 넓은 권한을 가진다. CI 는 체크아웃
# 후 테스트만 돌리므로 최소 권한(read) 으로 좁혀 악성 action/PR 의 토큰 남용 차단.
# (GH Code Scanning: actions/missing-workflow-permissions)
permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todolist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: todolist_test
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      OAUTH_STATE_SECRET: ci-test-oauth-state-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Integration tests
        run: npm run test:integration -- --passWithNoTests
