name: Frontend CI

on:
  push:
    branches: [main, 'feature/**']
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

# WHY: 기본 GITHUB_TOKEN 은 `contents: write` 등 넓은 권한을 가진다. CI 는 체크아웃
# 후 테스트만 돌리므로 최소 권한(read) 으로 좁혀 악성 action/PR 의 토큰 남용 차단.
# (GH Code Scanning: actions/missing-workflow-permissions)
permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests
